<html lang="en">
<Head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width intial-scale=1.0">
    <title>Netflix login| pawan</title>
    <link rel="stylesheet" href="style.css">
</Head>
<body>
    <nav>
        <a src="#"><img src="./images/netflixlogo.svg" alt="logo" ></a>
    </nav>
    <div class="form-wrapper">
        <h2>Sing In</h2>
        <form action="#">
            <div class="form-control">
                <input type="text" required> <!--1-->
                <label>Email or Phone number</label>
            </div>
            <div class="form-control">
                <input type="password" required> <!--2-->
                <label>password</label>
            </div>
            <button type="submit">Sign In</button>
            <div class="form-help">
                <div class="remeber-me">
                    <input type="checkbox" id="remeber-me">
                    <label for="remeber-me">RemeberMe</label>

                </div>
                <a href="#"> Need help?</a>

            </div>
        </form>
        <p>New to Net flix?<a href="#">Sign Up Now</a></p>
        <small>
            This page is protected by google reCAPTCHA toensure youre not a bot
            <a href="#">Learn more</a>

        </small>
    </div>
</body>
</html>
